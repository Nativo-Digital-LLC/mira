version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      - UPS_IP=10.0.0.2
      - UPS_PORT=3551
      - POLL_INTERVAL_MS=2000
      - DATA_DIR=/app/data
    volumes:
      - ups-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ups-data:
