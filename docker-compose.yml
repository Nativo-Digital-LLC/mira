version: '3.8'

services:
  apcups:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      # Modifica estos valores acorde a tu propia configuración de red:
      - UPS_IP=${UPS_IP:-192.168.1.10}
      - UPS_PORT=${UPS_PORT:-3551}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-2000}
      - DATA_DIR=/app/data
      # Si utilizas SMTP transaccional en lugar de Resend, especifícalo aquí.
      # - JWT_SECRET=tu-secreto-aleatorio (Opcional: el sistema genera uno e inserta en db.sqlite por defecto)
    volumes:
      - ups-data:/app/data
    restart: unless-stopped

volumes:
  ups-data:
