version: '3.8'

services:
  apcups:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - UPS_IP=10.0.0.2
      - UPS_PORT=3551
      - POLL_INTERVAL_MS=2000
      - DATA_DIR=/app/data
    volumes:
      - ups-data:/app/data
    restart: unless-stopped

volumes:
  ups-data:
