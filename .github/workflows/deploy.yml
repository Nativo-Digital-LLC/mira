name: Build and Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'   # e.g. v1.0.1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Private Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.REGISTRY_URL }}/apcups
          tags: |
            # Un push a main → :latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Un tag v1.2.3 → :1.2.3  y  :1.2  y  :1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=registry,ref=${{ secrets.REGISTRY_URL }}/apcups:buildcache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_URL }}/apcups:buildcache,mode=max

      - name: Trigger Dokploy Deployment
        run: curl -X GET "${{ secrets.DOKPLOY_WEBHOOK_URL }}"