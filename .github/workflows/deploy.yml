name: Build and Push

on:
  push:
    tags:
      - 'v*.*.*'   # e.g. v1.0.1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: lsantiagond/apcups
          tags: |
            # Siempre actualiza :latest
            type=raw,value=latest
            # v1.2.3 → :1.2.3  y  :1.2  y  :1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=lsantiagond/apcups:buildcache
          cache-to: type=registry,ref=lsantiagond/apcups:buildcache,mode=max

      # --- Despliegue Automático Opcional ---
      # Descomenta el bloque inferior ("Trigger Deployment Webhook") si utilizas servicios PaaS
      # como Portainer, CapRover, Dokploy, etc., y cuentas con un Webhook remoto.
      # 
      # - name: Trigger Deployment Webhook
      #   run: curl -X GET "${{ secrets.DEPLOY_WEBHOOK_URL }}"