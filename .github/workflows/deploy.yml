name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Private Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/apcups:latest
          platforms: linux/amd64
          cache-from: type=registry,ref=${{ secrets.REGISTRY_URL }}/apcups:buildcache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_URL }}/apcups:buildcache,mode=max

      - name: Trigger Dokploy Deployment
        run: curl -X GET "${{ secrets.DOKPLOY_WEBHOOK_URL }}"